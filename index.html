<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abnormal mfers</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="stage">
    <img class="logo" src="abnormal_logo.png" alt="Abnormal mfers" />

    <div class="characters">
      <img class="char-group" src="characters.png" alt="Abnormal mfers characters" />
    </div>

    <div class="welcome-box">
      <img class="welcome-new" src="new.gif" alt="NEW" />
      <span class="welcome-text">coming soon to Base</span>
    </div>

    <button id="enter-btn" type="button" aria-label="Enter">
      <img src="enter.gif" alt="ENTER" />
    </button>
  </main>

  <div class="new-banner" id="new-banner"></div>

  <!-- Free-floating decorative gifs (above everything) -->
  <div class="float-layer" id="float-layer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
